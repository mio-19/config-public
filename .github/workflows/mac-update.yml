name: "MacBuildUpdate"
on:
  pull_request:
  push:
  schedule:
    - cron: '11 */12 * * *'
jobs:
  tests:
    runs-on: macos-15
    steps:
      - name: Inspect Initial Storage State
        run: |
          echo "=== RUNNER STORAGE METRICS ==="
          df -h /
          echo "=== DETECTING APFS VOLUME TOPOLOGY ==="
          diskutil list
          echo "=== DISCOVERED XCODE APP RUNTIMES ==="
          ls -la /Applications | grep -i "Xcode" || true

      - name: Reclaim Host Disk Space
        run: |
          echo "=== TERMINATING CONFLICTING BACKGROUND SERVICES ==="
          sudo launchctl unload -w /System/Library/LaunchDaemons/com.apple.metadata.mds.plist || true

          echo "=== DETECTING CURRENT ACTIVE XCODE ENVIRONMENT ==="
          ACTIVE_XCODE_PATH=$(xcrun xcode-select --print-path)
          echo "Active Xcode path: ${ACTIVE_XCODE_PATH}"

          echo "=== PURGING INACTIVE XCODE VERSIONS ==="
          for xcode_app in /Applications/Xcode_*.app; do
            if [[ "${ACTIVE_XCODE_PATH}" != *"${xcode_app}"* ]]; then
              echo "Purging inactive installation: ${xcode_app}"
              sudo rm -rf "${xcode_app}" &
            fi
          done
          wait

          echo "=== ERADICATING ANDROID SDK AND COMPILER RUNTIMES ==="
          sudo rm -rf /Users/runner/Library/Android
          sudo rm -rf /Users/runner/Library/Developer/Xamarin
          sudo rm -rf ~/.android
          sudo rm -rf ~/.gradle

          echo "=== PRUNING SIMULATOR RUNTIMES ==="
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* || true
          rm -rf ~/Library/Developer/CoreSimulator/Devices/* || true

          echo "=== RECLAIMING HOMEBREW STORAGE ==="
          brew cleanup --prune=all || true
          rm -rf "$(brew --cache)" || true

          echo "=== REMOVING AUXILIARY TOOL CACHES ==="
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/powershell

      - name: Inspect Final Storage State
        run: |
          echo "=== POST-CLEANUP STORAGE METRICS ==="
          df -h /

      - uses: actions/checkout@v6
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= mio.cachix.org-1:FlupyyLPURqwdRqtPT/LBWKsXY7JKsDkzZQo2K6LeMM= mio-cache.cachix.org-1:ouuIJZ59HIflYjpLW6DRyMc1c+6r3kC/LHuqGUsWigg= cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= staging.cachix.org-1:WX63nyFdVdWGn6n59pIYwkcH/AtjJGjvMQFKlI2z00w= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=
          substituters = https://cache.nixos.org/ https://mio.cachix.org/ https://mio-cache.cachix.org/ https://cache.garnix.io https://nix-community.cachix.org/ https://staging.cachix.org/ https://cache.numtide.com
    - uses: cachix/cachix-action@v17
      with:
        name: mio-config
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - run: (cd mac && nix flake update && nix build .#darwinConfigurations.NixMac.system --keep-going)
      continue-on-error: true