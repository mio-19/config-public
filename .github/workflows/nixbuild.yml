name: nixbuild

# https://github.com/nixbuild/nixbuild-action
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.host }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [fw13, husky, ipc, macvirt]
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_version: '2.31.2'
          nix_conf: |
            experimental-features = nix-command flakes
            allow-import-from-derivation = true
      - uses: nixbuild/nixbuild-action@master
        with:
          nixbuild_token: ${{ secrets.nixbuild_token }}
      - name: Build NixOS configuration
        run: |
          nix build ./nixos#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --eval-store auto \
            --store ssh-ng://nixbuild \
            --builders "" --max-jobs 2